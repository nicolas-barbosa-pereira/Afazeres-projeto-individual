<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afazeres | Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="areaNotificacao"></div>

    <nav id="menuPrincipal" class="escondido">
        <div class="nav-conteudo">
            <div class="logo">🔵 Afazeres</div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span id="nomeUsuarioLogado" style="font-size: 0.85rem; font-weight: 500;"></span>
                <button onclick="Logout()" style="color: #ef4444; border: none; background: none; font-weight: 700; cursor: pointer;">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <!-- TELA DE LOGIN -->
        <section id="telaLogin" class="escondido">
            <div class="cartao" style="margin: 0 auto; max-width: 400px;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h1 style="margin-bottom: 0.5rem;">Bem-vindo</h1>
                    <p style="color: var(--cor-texto-suave)">Acesse para gerenciar suas tarefas</p>
                </div>
                <form onsubmit="realizarLogin(event)">
                    <div class="grupo-input">
                        <label>E-mail</label>
                        <input type="email" id="loginEmail" required placeholder="exemplo@email.com">
                    </div>
                    <div class="grupo-input">
                        <label>Senha</label>
                        <input type="password" id="loginSenha" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primario" style="width: 100%">Entrar</button>
                </form>
                <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                    Não tem uma conta? <button onclick="alternarTela('cadastro')" style="background: none; border: none; color: var(--cor-primaria); font-weight: 700; cursor: pointer;">Cadastre-se</button>
                </div>
            </div>
        </section>

        <!-- TELA DE CADASTRO -->
        <section id="telaCadastro" class="escondido">
            <div class="cartao" style="margin: 0 auto; max-width: 650px;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h1>Criar Conta</h1>
                    <p style="color: var(--cor-texto-suave)">Junte-se ao Afazeres hoje</p>
                </div>
                <form onsubmit="realizarCadastro(event)" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    
                    <div class="grupo-input" style="grid-column: span 2">
                        <label>Nome Completo (Texto)</label>
                        <input type="text" id="cadNome" required placeholder="Ex: Nicolas Barbosa">
                    </div>
                    
                    <div class="grupo-input">
                        <label>E-mail (Texto)</label>
                        <input type="email" id="cadEmail" required placeholder="ex@email.com">
                    </div>

                    <div class="grupo-input">
                        <label>Cor dos Olhos (Texto)</label>
                        <input type="text" id="cadOlhos" placeholder="Ex: Castanho">
                    </div>

                    <div class="grupo-input">
                        <label>Senha (Texto)</label>
                        <input type="password" id="cadSenha" required placeholder="Min. 6 caracteres">
                    </div>

                    <div class="grupo-input">
                        <label>Idade (Numérico)</label>
                        <input type="number" id="cadIdade" min="1" max="120" placeholder="Ex: 20">
                    </div>

                    <div class="grupo-input">
                        <label>Data de Nascimento (Data)</label>
                        <input type="date" id="cadData" required>
                    </div>

                    <div class="grupo-input">
                        <label>Sexo (Radio Buttons)</label>
                        <div class="seletor-genero">
                            <div class="opcao-genero">
                                <input type="radio" name="sexo" value="M" id="sexoM" checked>
                                <label for="sexoM">Masculino</label>
                            </div>
                            <div class="opcao-genero">
                                <input type="radio" name="sexo" value="F" id="sexoF">
                                <label for="sexoF">Feminino</label>
                            </div>
                        </div>
                    </div>

                    <div class="grupo-input" style="grid-column: span 2">
                        <label>Escolaridade (Dropdown Dinâmico via API)</label>
                        <select id="cadEscolaridade" required>
                            <option value="" disabled selected>Carregando opções...</option>
                        </select>
                    </div>

                    <div class="grupo-input" style="grid-column: span 2">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" id="cadTermos" required style="width: 18px; height: 18px;">
                            <span style="font-size: 0.9rem;">Aceito os termos e condições de uso (Checkbox)</span>
                        </label>
                    </div>

                    <div class="grupo-input" style="grid-column: span 2">
                        <button type="submit" class="btn btn-primario" style="width: 100%">Finalizar Cadastro</button>
                    </div>
                </form>
                <div style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                    Já tem conta? <button onclick="alternarTela('login')" style="background: none; border: none; color: var(--cor-primaria); font-weight: 700; cursor: pointer;">Fazer Login</button>
                </div>
            </div>
        </section>

        <!-- TELA TAREFAS -->
        <section id="telaDashboard" class="escondido">
            <div class="cabecalho-dash">
                <div>
                    <h1>Minhas Tarefas</h1>
                    <p style="color: var(--cor-texto-suave)">Gerencie seus afazeres diários</p>
                </div>
                <button onclick="abrirModalTarefa()" class="btn btn-primario">➕ Nova Tarefa</button>
            </div>

            <div id="listaTarefas" class="grade-tarefas"></div>

            <div id="estadoVazio" class="escondido" style="text-align: center; padding: 5rem 0;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">📝</div>
                <h3>Nenhuma tarefa por aqui</h3>
                <button onclick="abrirModalTarefa()" style="color: var(--cor-primaria); background: none; border: none; font-weight: 700; cursor: pointer;">Crie sua primeira tarefa</button>
            </div>
        </section>
    </div>

    <!-- MODAL DE TAREFA -->
    <div id="modalTarefa" class="overlay-modal escondido">
        <div class="conteudo-modal">
            <div class="cabecalho-modal">
                <h3 id="tituloModal">Nova Tarefa</h3>
                <button onclick="fecharModalTarefa()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="corpo-modal">
                <form onsubmit="processarTarefa(event)">
                    <input type="hidden" id="tarefaId">
                    <div class="grupo-input">
                        <label>Título</label>
                        <input type="text" id="tarefaTitulo" required>
                    </div>
                    <div class="grupo-input">
                        <label>Descrição</label>
                        <textarea id="tarefaDescricao" rows="3"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="grupo-input">
                            <label>Prioridade</label>
                            <select id="tarefaPrioridade">
                                <option value="1">Baixa</option>
                                <option value="2">Média</option>
                                <option value="3">Alta</option>
                            </select>
                        </div>
                        <div class="grupo-input" id="containerStatus">
                            <label>Status</label>
                            <select id="tarefaStatus">
                                <option value="PENDENTE">Pendente</option>
                                <option value="EM_ANDAMENTO">Em Andamento</option>
                                <option value="CONCLUIDO">Concluído</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <button type="button" onclick="fecharModalTarefa()" class="btn btn-secundario" style="flex: 1;">Cancelar</button>
                        <button type="submit" class="btn btn-primario" style="flex: 1;">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8080";
        let usuarioSessao = null;

        window.onload = () => {
            buscarEscolaridades();
            alternarTela('login');
        };

        function alternarTela(nomeTela) {
            const telas = ['telaLogin', 'telaCadastro', 'telaDashboard', 'menuPrincipal'];
            telas.forEach(id => document.getElementById(id).classList.add('escondido'));

            if (nomeTela === 'login') document.getElementById('telaLogin').classList.remove('escondido');
            if (nomeTela === 'cadastro') document.getElementById('telaCadastro').classList.remove('escondido');
            if (nomeTela === 'dashboard') {
                document.getElementById('telaDashboard').classList.remove('escondido');
                document.getElementById('menuPrincipal').classList.remove('escondido');
                document.getElementById('nomeUsuarioLogado').innerText = `Olá, ${usuarioSessao.nome}`;
                carregarTarefas();
            }
        }

        async function buscarEscolaridades() {
            const select = document.getElementById('cadEscolaridade');
            try {
                const resposta = await fetch(`${API_URL}/usuarios/escolaridades`);
                if (resposta.ok) {
                    const dados = await resposta.json();
                    select.innerHTML = '<option value="" disabled selected>Selecione sua escolaridade</option>';
                    dados.forEach(escolaridade => {
                        const opt = document.createElement('option');
                        opt.value = escolaridade;
                        opt.innerText = escolaridade;
                        select.appendChild(opt);
                    });
                }
            } catch (erro) {
                console.error("Falha ao carregar escolaridades:", erro);
                select.innerHTML = '<option value="Ensino Médio completo">Ensino Médio completo</option>';
            }
        }

        async function realizarLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;

            try {
                const resposta = await fetch(`${API_URL}/usuarios/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (resposta.ok) {
                    usuarioSessao = await resposta.json();
                    exibirAviso("Login realizado com sucesso!", "sucesso");
                    alternarTela('dashboard');
                } else {
                    exibirAviso("E-mail ou senha incorretos.", "erro");
                }
            } catch { exibirAviso("Erro ao conectar com o servidor.", "erro"); }
        }

        async function realizarCadastro(e) {
            e.preventDefault();
            const sexo = document.querySelector('input[name="sexo"]:checked').value;
            
            const corpoReq = {
                nome: document.getElementById('cadNome').value,
                email: document.getElementById('cadEmail').value,
                senha: document.getElementById('cadSenha').value,
                dtNascimento: document.getElementById('cadData').value,
                sexo: sexo,
                corDosOlhos: document.getElementById('cadOlhos').value || "Não informado",
                escolaridade: document.getElementById('cadEscolaridade').value
            };

            try {
                const resposta = await fetch(`${API_URL}/usuarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(corpoReq)
                });

                if (resposta.status === 201) {
                    exibirAviso("Cadastro concluído! Faça login.", "sucesso");
                    alternarTela('login');
                } else {
                    const erroTxt = await resposta.text();
                    exibirAviso(erroTxt || "Erro ao cadastrar usuário.", "erro");
                }
            } catch { exibirAviso("Erro de conexão.", "erro"); }
        }

        async function carregarTarefas() {
            const container = document.getElementById('listaTarefas');
            const vazio = document.getElementById('estadoVazio');
            container.innerHTML = '';

            try {
                const resposta = await fetch(`${API_URL}/tarefas?id=${usuarioSessao.id}`);
                const tarefas = await resposta.json();

                if (!tarefas || tarefas.length === 0) {
                    vazio.classList.remove('escondido');
                } else {
                    vazio.classList.add('escondido');
                    tarefas.forEach(t => {
                        const card = document.createElement('div');
                        card.className = 'card-tarefa';
                        const classePrioridade = t.prioridade == 1 ? 'baixa' : (t.prioridade == 2 ? 'media' : 'alta');
                        const textoPrioridade = t.prioridade == 1 ? 'Baixa' : (t.prioridade == 2 ? 'Média' : 'Alta');

                        card.innerHTML = `
                            <div class="tag-prioridade ${classePrioridade}">${textoPrioridade}</div>
                            <div class="acoes-tarefa">
                                <button onclick="editarTarefa(${t.id}, '${t.titulo.replace(/'/g, "\\'")}', '${(t.descricao || '').replace(/'/g, "\\'")}', ${t.prioridade}, '${t.status}')">✏️</button>
                                <button onclick="deletarTarefa(${t.id})">🗑️</button>
                            </div>
                            <h3 style="margin-bottom: 0.5rem; padding-right: 2rem;">${t.titulo}</h3>
                            <p style="font-size: 0.85rem; color: var(--cor-texto-suave); margin-bottom: 1.5rem; flex-grow: 1;">${t.descricao || 'Sem descrição'}</p>
                            <div style="font-size: 0.75rem; border-top: 1px solid var(--cor-borda); padding-top: 0.75rem; display: flex; justify-content: space-between; align-items: center;">
                                <span>📅 ${new Date(t.dataCriacao).toLocaleDateString()}</span>
                                <span class="badge-status status-${t.status}">${t.status.replace('_', ' ')}</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch { vazio.classList.remove('escondido'); }
        }

        async function processarTarefa(e) {
            e.preventDefault();
            const id = document.getElementById('tarefaId').value;
            const payload = {
                titulo: document.getElementById('tarefaTitulo').value,
                descricao: document.getElementById('tarefaDescricao').value,
                prioridade: parseInt(document.getElementById('tarefaPrioridade').value),
                status: document.getElementById('tarefaStatus').value,
                fkUsuario: usuarioSessao.id
            };

            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/tarefas/${id}` : `${API_URL}/tarefas`;

            try {
                const resposta = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resposta.ok) {
                    exibirAviso(id ? "Tarefa atualizada!" : "Tarefa criada!", "sucesso");
                    fecharModalTarefa();
                    carregarTarefas();
                }
            } catch { exibirAviso("Erro ao salvar tarefa.", "erro"); }
        }

        async function deletarTarefa(id) {
            if (!confirm("Tem certeza que deseja excluir esta tarefa?")) return;
            try {
                const resposta = await fetch(`${API_URL}/tarefas/${id}`, { method: 'DELETE' });
                if (resposta.ok) {
                    exibirAviso("Tarefa excluída.", "sucesso");
                    carregarTarefas();
                }
            } catch { exibirAviso("Erro ao excluir tarefa.", "erro"); }
        }

        function abrirModalTarefa() {
            document.getElementById('tituloModal').innerText = "Nova Tarefa";
            document.getElementById('tarefaId').value = "";
            document.getElementById('tarefaTitulo').value = "";
            document.getElementById('tarefaDescricao').value = "";
            document.getElementById('tarefaStatus').value = "PENDENTE";
            document.getElementById('containerStatus').classList.add('escondido');
            document.getElementById('modalTarefa').classList.remove('escondido');
        }

        function editarTarefa(id, titulo, desc, prio, status) {
            document.getElementById('tituloModal').innerText = "Editar Tarefa";
            document.getElementById('tarefaId').value = id;
            document.getElementById('tarefaTitulo').value = titulo;
            document.getElementById('tarefaDescricao').value = desc === 'null' ? '' : desc;
            document.getElementById('tarefaPrioridade').value = prio;
            document.getElementById('tarefaStatus').value = status;
            document.getElementById('containerStatus').classList.remove('escondido');
            document.getElementById('modalTarefa').classList.remove('escondido');
        }

        function fecharModalTarefa() { document.getElementById('modalTarefa').classList.add('escondido'); }
        
        function Logout() { 
            usuarioSessao = null; 
            alternarTela('login'); 
        }

        function exibirAviso(mensagem, tipo) {
            const area = document.getElementById('areaNotificacao');
            const toast = document.createElement('div');
            toast.className = `notificacao ${tipo}`;
            toast.innerText = mensagem;
            area.appendChild(toast);
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                setTimeout(() => toast.remove(), 500); 
            }, 3000);
        }
    </script>
</body>
</html>
